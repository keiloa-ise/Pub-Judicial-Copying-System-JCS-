# JCS — full stack: SQL Server + API + Nginx-served SPA.
# First deploy:  set values in .env (JCS_BOOTSTRAP=true), then `docker compose up -d --build`.
# After it's up: set JCS_BOOTSTRAP=false in .env and `docker compose up -d` again.
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"   # remote DB access (SSMS/Azure Data Studio). See DEPLOY.md → Remote DB access.
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      # Server default collation → the Jcs DB inherits Arabic_CI_AS when first created.
      MSSQL_COLLATION: Arabic_CI_AS
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Jcs: "Server=mssql;Database=Jcs;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: jcs
      Jwt__Audience: jcs
      # One-time bootstrap (migrations + reference data + first admin). Turn off after first run.
      JCS_BOOTSTRAP: ${JCS_BOOTSTRAP:-false}
      JCS_ADMIN_USERNAME: ${JCS_ADMIN_USERNAME:-admin}
      JCS_ADMIN_PASSWORD: ${JCS_ADMIN_PASSWORD:-}
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"      # add "443:443" + a TLS terminator (or front with host Nginx/Caddy) for HTTPS
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mssql-data:
